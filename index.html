<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click the Target!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 600px;
    height: 520px;
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  /* Score bar at the top */
  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: rgba(255,255,255,0.07);
  }
  #scoreDisplay {
    font-size: 28px;
    font-weight: bold;
    color: #ffe66d;
    text-shadow: 0 0 12px #ffe66d88;
  }
  #progressBar {
    flex: 1;
    margin: 0 20px;
    height: 18px;
    background: rgba(255,255,255,0.15);
    border-radius: 9px;
    overflow: hidden;
  }
  #progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #43e97b, #ffe66d, #f9ca24);
    border-radius: 9px;
    transition: width 0.2s ease;
  }
  #goalDisplay {
    font-size: 18px;
    color: #aaa;
  }
  /* The play area where the target appears */
  #playArea {
    position: absolute;
    top: 70px; left: 0;
    width: 100%;
    height: 450px;
    z-index: 5;
  }
  /* The clickable target */
  #target {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    /* Pulse animation */
    animation: pulse 0.7s ease-in-out infinite alternate;
    box-shadow: 0 0 24px 6px rgba(255,255,255,0.25);
    user-select: none;
    transition: transform 0.08s;
    z-index: 6;
    /* Start hidden — shown when game starts */
    display: none;
  }
  #target:active { transform: scale(0.88); }
  @keyframes pulse {
    from { box-shadow: 0 0 16px 4px rgba(255,255,100,0.3); transform: scale(1); }
    to   { box-shadow: 0 0 32px 10px rgba(255,200,0,0.55); transform: scale(1.08); }
  }
  /* Start screen */
  #startScreen {
    position: absolute;
    z-index: 100;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
  }
  #startScreen h1 {
    font-size: 46px;
    color: #ffe66d;
    text-shadow: 0 0 20px #ffe66daa;
    margin-bottom: 12px;
  }
  #startScreen p {
    font-size: 20px;
    color: #ccc;
    margin-bottom: 36px;
    text-align: center;
    line-height: 1.7;
  }
  /* Win overlay */
  #winScreen {
    position: absolute;
    z-index: 200;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
  }
  #winScreen h2 {
    font-size: 52px;
    color: #ffe66d;
    text-shadow: 0 0 24px #ffe66d;
    margin-bottom: 14px;
    animation: bounce 0.5s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }
  #winScreen p {
    font-size: 22px;
    color: #fff;
    margin-bottom: 32px;
  }
  /* Shared big button style */
  .bigBtn {
    background: linear-gradient(135deg, #f9ca24, #f0932b);
    color: #1a1a2e;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(249,202,36,0.45);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .bigBtn:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 28px rgba(249,202,36,0.65);
  }
  /* Score pop-up text that floats up */
  .popup {
    position: absolute;
    font-size: 26px;
    font-weight: bold;
    color: #ffe66d;
    text-shadow: 0 0 8px #000;
    pointer-events: none;
    z-index: 50;
    animation: floatUp 0.9s ease forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1.2); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
  }
  /* Star confetti pieces */
  .confetti {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    z-index: 300;
    animation: fall 1.6s ease forwards;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(200px) rotate(360deg); }
  }
</style>
</head>
<body>
<div id="gameContainer">

  <!-- HUD (score bar) — shown during gameplay -->
  <div id="hud">
    <div id="scoreDisplay">⭐ 0</div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="goalDisplay">Goal: 20</div>
  </div>

  <!-- Play area -->
  <div id="playArea">
    <!-- The clickable target emoji -->
    <div id="target">🎯</div>
  </div>

  <!-- Start screen -->
  <div id="startScreen">
    <h1>🎯 Click It!</h1>
    <p>Click the target as fast as you can!<br>Reach <strong style="color:#ffe66d">20 clicks</strong> to win! 🏆</p>
    <button class="bigBtn" id="startBtn">Play! 🚀</button>
  </div>

  <!-- Win screen -->
  <div id="winScreen">
    <h2>🏆 You Win!</h2>
    <p id="winMsg">You clicked 20 times! Amazing!</p>
    <button class="bigBtn" id="restartBtn">Play Again 🔄</button>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // --- Get all the elements we need ---
  var target      = document.getElementById('target');
  var startScreen = document.getElementById('startScreen');
  var winScreen   = document.getElementById('winScreen');
  var scoreDisplay= document.getElementById('scoreDisplay');
  var progressFill= document.getElementById('progressFill');
  var winMsg      = document.getElementById('winMsg');
  var playArea    = document.getElementById('playArea');

  // --- Game state ---
  var score = 0;
  var WIN_SCORE = 20;
  var gameActive = false;

  // Emoji choices so the target keeps things interesting
  var emojis = ['🎯','🌟','🔥','💎','🍭','🎪','⚡','🌈'];

  // --- Helper: place the target at a random spot inside playArea ---
  function moveTarget() {
    var areaW = playArea.offsetWidth;
    var areaH = playArea.offsetHeight;
    var size  = 80; // matches CSS width/height
    var padding = 10;
    var newX = padding + Math.random() * (areaW - size - padding * 2);
    var newY = padding + Math.random() * (areaH - size - padding * 2);
    target.style.left = newX + 'px';
    target.style.top  = newY + 'px';
    // Pick a random fun color background
    var colors = [
      'linear-gradient(135deg,#f9ca24,#f0932b)',
      'linear-gradient(135deg,#6ab04c,#badc58)',
      'linear-gradient(135deg,#e84393,#fd79a8)',
      'linear-gradient(135deg,#00cec9,#55efc4)',
      'linear-gradient(135deg,#a29bfe,#6c5ce7)',
      'linear-gradient(135deg,#fd79a8,#e17055)',
      'linear-gradient(135deg,#fdcb6e,#e17055)'
    ];
    target.style.background = colors[Math.floor(Math.random() * colors.length)];
    // Pick a random emoji
    target.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  }

  // --- Helper: update the score display and progress bar ---
  function updateHUD() {
    scoreDisplay.textContent = '⭐ ' + score;
    var pct = (score / WIN_SCORE) * 100;
    progressFill.style.width = pct + '%';
  }

  // --- Helper: spawn a "+1" floating popup at click position ---
  function spawnPopup(x, y) {
    var pop = document.createElement('div');
    pop.className = 'popup';
    pop.textContent = '+1';
    // Position relative to playArea
    pop.style.left = (x - 20) + 'px';
    pop.style.top  = (y - 20) + 'px';
    playArea.appendChild(pop);
    // Remove after animation ends
    pop.addEventListener('animationend', function() { pop.remove(); });
  }

  // --- Helper: burst of confetti on win ---
  function spawnConfetti() {
    var pieces = ['🌟','⭐','🎉','✨','🏆','🎊','💛','🔥'];
    for (var i = 0; i < 30; i++) {
      (function(i) {
        setTimeout(function() {
          var el = document.createElement('div');
          el.className = 'confetti';
          el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
          el.style.left = (Math.random() * 560) + 'px';
          el.style.top  = (Math.random() * 100) + 'px';
          el.style.animationDelay = (Math.random() * 0.4) + 's';
          winScreen.appendChild(el);
          el.addEventListener('animationend', function() { el.remove(); });
        }, i * 60);
      })(i);
    }
  }

  // --- Start the game ---
  function startGame() {
    score = 0;
    gameActive = true;
    updateHUD();
    startScreen.style.display = 'none';
    winScreen.style.display   = 'none';
    target.style.display      = 'flex'; // show the target
    moveTarget();
  }

  // --- Show win screen ---
  function showWin() {
    gameActive = false;
    target.style.display = 'none';
    winMsg.textContent = 'You clicked ' + WIN_SCORE + ' times! Amazing! 🎉';
    winScreen.style.display = 'flex';
    spawnConfetti();
  }

  // --- Target click handler ---
  target.addEventListener('click', function(e) {
    if (!gameActive) return;
    score++;
    updateHUD();

    // Calculate click position relative to playArea for the popup
    var rect = playArea.getBoundingClientRect();
    var clickX = e.clientX - rect.left;
    var clickY = e.clientY - rect.top;
    spawnPopup(clickX, clickY);

    if (score >= WIN_SCORE) {
      showWin();
    } else {
      moveTarget(); // jump to new spot
    }
  });

  // --- Start button ---
  var startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.addEventListener('click', function() {
    startGame();
  });

  // --- Restart button ---
  var restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', function() {
    startGame();
  });

  // BUTTON CHECKLIST: #startBtn ✓  #restartBtn ✓  #target ✓
});
</script>
</body>
</html>
