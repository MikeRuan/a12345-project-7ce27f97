<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eagle Fisher 🦅</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #87CEEB;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; font-family: Arial, sans-serif; overflow: hidden;
}
#gameContainer {
  position: relative; width: 600px; height: 550px;
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
canvas { position: absolute; top:0; left:0; z-index:1; }
#hud {
  position: absolute; top:0; left:0; width:100%; padding:8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10; background: rgba(0,0,0,0.25); pointer-events: none;
}
#hud span { color:#fff; font-size:16px; font-weight:bold; text-shadow:0 1px 3px #000; }
#progressBar {
  flex:1; margin:0 12px; height:14px;
  background:rgba(255,255,255,0.25); border-radius:7px; overflow:hidden;
}
#progressFill {
  height:100%; width:0%;
  background: linear-gradient(90deg,#43e97b,#ffe66d);
  border-radius:7px; transition: width 0.2s;
}
#overlay {
  position: absolute; top:0; left:0; width:100%; height:100%;
  z-index: 100; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background: linear-gradient(180deg,#87CEEB 40%,#1a6ba0);
  pointer-events: auto;
}
#overlay h1 { font-size:44px; color:#fff; text-shadow:0 2px 8px #0005; margin-bottom:8px; }
#overlay p  { font-size:16px; color:#fff; text-align:center; line-height:1.7;
               margin-bottom:28px; padding:0 20px; text-shadow:0 1px 4px #0006; }
.bigBtn {
  background: linear-gradient(135deg,#f9ca24,#f0932b);
  color:#1a1a2e; border:none; border-radius:50px;
  padding:14px 44px; font-size:20px; font-weight:bold;
  cursor:pointer; box-shadow:0 6px 20px rgba(249,202,36,0.5);
  transition: transform 0.1s; margin:6px;
}
.bigBtn:hover { transform:scale(1.07); }
#msgBox {
  position:absolute; top:55px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.6); color:#ffe66d; font-size:18px; font-weight:bold;
  padding:8px 22px; border-radius:20px; z-index:20; display:none;
  pointer-events:none; white-space:nowrap;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c" width="600" height="550"></canvas>
  <div id="hud">
    <span id="livesDisplay">❤️❤️❤️</span>
    <div id="progressBar"><div id="progressFill"></div></div>
    <span id="scoreDisplay">⭐0 L1</span>
  </div>
  <div id="msgBox"></div>
  <div id="overlay">
    <h1>🦅 Eagle Fisher</h1>
    <p>用方向键或 WASD 控制老鹰！<br>
       抓鱼得分，避开🦈鲨鱼！<br>
       水下超过1.5秒自动返回水面 🌊<br>
       <b>大鱼+1.5 中鱼+1 小鱼+0.5</b><br>
       每6分升一关，共三关！</p>
    <button class="bigBtn" id="startBtn">开始游戏 🚀</button>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = 600, H = 550, WATER_Y = 260;

  var livesEl  = document.getElementById('livesDisplay');
  var scoreEl  = document.getElementById('scoreDisplay');
  var progFill = document.getElementById('progressFill');
  var overlay  = document.getElementById('overlay');
  var msgBox   = document.getElementById('msgBox');

  // ── Game state ──────────────────────────────────────────────────────────
  var score=0, lives=3, level=1, gameActive=false;
  var LEVEL_SCORES=[0,6,12,18];
  var eagle={x:300,y:150,w:54,h:44,vx:0,vy:0,inWater:false,waterTimer:0,returning:false,invincible:0};
  var keys={};
  var clouds=[], birds=[], raindrops=[], fishArr=[], waveOffsets=[];
  var frameCount=0, msgTimer=0;

  // ── Fish definitions ────────────────────────────────────────────────────
  var FISH_TYPES=[
    {size:'big',   pts:1.5, w:52, h:32, emoji:'🐟', speed:1.2},
    {size:'mid',   pts:1.0, w:38, h:24, emoji:'🐠', speed:1.6},
    {size:'small', pts:0.5, w:26, h:18, emoji:'🐡', speed:2.0},
    {size:'shark', pts:0,   w:60, h:36, emoji:'🦈', speed:1.4}
  ];

  // ── Score pop-ups ────────────────────────────────────────────────────────
  var popups=[];
  function addPopup(txt, x, y) {
    popups.push({txt:txt, x:x, y:y, life:60});
  }

  // ── Reset / spawn ────────────────────────────────────────────────────────
  function resetLevel() {
    fishArr=[];
    for(var i=0;i<10;i++) spawnFish();
  }

  function spawnFish() {
    var t = FISH_TYPES[Math.floor(Math.random()*FISH_TYPES.length)];
    var fromLeft = Math.random()<0.5;
    fishArr.push({
      x: fromLeft ? -t.w-10 : W+10,
      y: WATER_Y+30+Math.random()*(H-WATER_Y-t.h-40),
      w:t.w, h:t.h, emoji:t.emoji, pts:t.pts, size:t.size,
      vx:(fromLeft?1:-1)*t.speed,
      vy:(Math.random()-0.5)*0.4,
      popped:false, popTimer:0, popVy:0
    });
  }

  // ── Scene init ───────────────────────────────────────────────────────────
  function initClouds() {
    clouds=[];
    for(var i=0;i<7;i++)
      clouds.push({x:Math.random()*W, y:20+Math.random()*90,
                   w:70+Math.random()*70, speed:0.25+Math.random()*0.4,
                   alpha:0.75+Math.random()*0.25});
  }
  function initBirds() {
    birds=[];
    for(var i=0;i<5;i++)
      birds.push({x:Math.random()*W, y:15+Math.random()*70,
                  wingUp:Math.random()<0.5, wingTimer:0,
                  speed:0.5+Math.random()*0.6});
  }
  function initWaveOffsets() {
    waveOffsets=[];
    for(var i=0;i<5;i++) waveOffsets.push(Math.random()*Math.PI*2);
  }

  // ── Start ────────────────────────────────────────────────────────────────
  function startGame() {
    score=0; lives=3; level=1; gameActive=true;
    eagle={x:300,y:150,w:54,h:44,vx:0,vy:0,
           inWater:false,waterTimer:0,returning:false,invincible:0};
    keys={}; raindrops=[]; popups=[];
    overlay.style.display='none';
    initClouds(); initBirds(); initWaveOffsets();
    resetLevel(); updateHUD();
    requestAnimationFrame(loop);
  }

  function showMsg(txt, dur) {
    msgBox.textContent=txt; msgBox.style.display='block'; msgTimer=dur||90;
  }

  function updateHUD() {
    var h=''; for(var i=0;i<lives;i++) h+='❤️';
    livesEl.textContent=h||'💀';
    scoreEl.textContent='⭐'+score.toFixed(1)+' L'+level;
    var base=LEVEL_SCORES[level-1], need=LEVEL_SCORES[level]||18;
    var pct=Math.min(100,((score-base)/(need-base))*100);
    progFill.style.width=pct+'%';
  }

  // Level-scaling helpers
  function getWindStrength() { return level*0.9; }
  function getRainRate()     { return level===1?1 : level===2?4:8; }
  function getWaveAmp()      { return 5+level*5; }

  // ── Draw helpers ─────────────────────────────────────────────────────────
  function drawSky() {
    var g=ctx.createLinearGradient(0,0,0,WATER_Y);
    if(level===1){ g.addColorStop(0,'#87CEEB'); g.addColorStop(1,'#c9eaf7'); }
    else if(level===2){ g.addColorStop(0,'#6aaecc'); g.addColorStop(1,'#a8cfe0'); }
    else { g.addColorStop(0,'#4a8aaa'); g.addColorStop(1,'#7ab0c8'); }
    ctx.fillStyle=g; ctx.fillRect(0,0,W,WATER_Y);
  }

  function drawOcean() {
    var g=ctx.createLinearGradient(0,WATER_Y,0,H);
    g.addColorStop(0,'#1a78c2'); g.addColorStop(1,'#0a3d6b');
    ctx.fillStyle=g; ctx.fillRect(0,WATER_Y,W,H-WATER_Y);
    // subtle light rays
    ctx.save(); ctx.globalAlpha=0.04;
    for(var i=0;i<5;i++){
      var rx=100+i*100;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.moveTo(rx,WATER_Y);
      ctx.lineTo(rx-30,H); ctx.lineTo(rx+30,H); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  function drawWaterSurface() {
    var amp=getWaveAmp();
    ctx.beginPath(); ctx.moveTo(0,WATER_Y);
    for(var x=0;x<=W;x+=3){
      var y=WATER_Y
          +Math.sin((x+frameCount*2)*0.033)*amp*0.55
          +Math.sin((x+frameCount*1.4)*0.068)*amp*0.45;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
    ctx.fillStyle='rgba(26,120,200,0.5)'; ctx.fill();
    // white foam line
    ctx.beginPath(); ctx.moveTo(0,WATER_Y);
    for(var x=0;x<=W;x+=3){
      var y=WATER_Y
          +Math.sin((x+frameCount*2)*0.033)*amp*0.55
          +Math.sin((x+frameCount*1.4)*0.068)*amp*0.45;
      ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2.5; ctx.stroke();
  }

  function drawClouds() {
    clouds.forEach(function(cl){
      cl.x += cl.speed*(1+getWindStrength()*0.35);
      if(cl.x > W+cl.w) cl.x = -cl.w-10;
      ctx.save(); ctx.globalAlpha=cl.alpha;
      ctx.fillStyle='#fff';
      var cx=cl.x, cy=cl.y, cw=cl.w;
      ctx.beginPath(); ctx.ellipse(cx,cy,cw/2,17,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx-cw*0.22,cy+4,cw*0.28,13,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+cw*0.22,cy+4,cw*0.28,13,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+cw*0.05,cy-8,cw*0.22,12,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawBirds() {
    birds.forEach(function(b){
      b.x += b.speed*(1+getWindStrength()*0.25);
      if(b.x>W+20) b.x=-20;
      b.wingTimer++;
      if(b.wingTimer>10){b.wingUp=!b.wingUp; b.wingTimer=0;}
      ctx.strokeStyle='#334'; ctx.lineWidth=2.2; ctx.lineCap='round';
      var wy=b.wingUp?-7:3;
      ctx.beginPath();
      ctx.moveTo(b.x-11,b.y); ctx.quadraticCurveTo(b.x-5,b.y+wy,b.x,b.y);
      ctx.moveTo(b.x,b.y);    ctx.quadraticCurveTo(b.x+5,b.y+wy,b.x+11,b.y);
      ctx.stroke();
    });
  }

  function drawRain() {
    var rate=getRainRate();
    for(var i=0;i<rate;i++)
      raindrops.push({x:Math.random()*W, y:-10, len:7+Math.random()*7, spd:9+Math.random()*4});
    ctx.strokeStyle='rgba(160,210,255,0.55)'; ctx.lineWidth=1.4;
    ctx.beginPath();
    for(var i=raindrops.length-1;i>=0;i--){
      var d=raindrops[i];
      d.x += getWindStrength()*0.9; d.y += d.spd;
      ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x - getWindStrength()*0.4, d.y+d.len);
      if(d.y>H) raindrops.splice(i,1);
    }
    ctx.stroke();
  }

  function drawFish() {
    fishArr.forEach(function(f){
      if(f.popped){
        // Rise to surface then fall back
        f.y += f.popVy;
        f.popVy += 0.25; // gravity pulls back
        if(f.y > H-f.h-5){ f.y=H-f.h-5; f.popped=false; f.popVy=0; }
        if(f.y < WATER_Y+2){ f.popVy=Math.abs(f.popVy)*0.6+0.5; }
      } else {
        f.x+=f.vx; f.y+=f.vy;
        if(f.y<WATER_Y+5){f.y=WATER_Y+5; f.vy=Math.abs(f.vy);}
        if(f.y>H-f.h-5) {f.y=H-f.h-5;  f.vy=-Math.abs(f.vy);}
        if(f.x<-f.w-20) {f.x=W+10; f.y=WATER_Y+20+Math.random()*(H-WATER_Y-f.h-40);}
        if(f.x>W+20)    {f.x=-f.w-10; f.y=WATER_Y+20+Math.random()*(H-WATER_Y-f.h-40);}
      }
      ctx.save();
      ctx.font=f.h+'px serif';
      if(f.vx<0||f.popped){
        ctx.translate(f.x+f.w, f.y+f.h*0.9);
        ctx.scale(-1,1);
        ctx.fillText(f.emoji,0,0);
      } else {
        ctx.fillText(f.emoji, f.x, f.y+f.h*0.9);
      }
      ctx.restore();
    });
  }

  function drawEagle() {
    var e=eagle;
    ctx.save();
    if(e.invincible>0 && Math.floor(e.invincible/5)%2===0) ctx.globalAlpha=0.35;
    ctx.font=e.h+'px serif';
    if(e.vx<0){
      ctx.translate(e.x+e.w, e.y+e.h);
      ctx.scale(-1,-1);
      ctx.fillText('🦅',0,0);
    } else {
      ctx.fillText('🦅', e.x, e.y+e.h);
    }
    ctx.restore();
    // Underwater breath bar
    if(e.inWater && !e.returning){
      var pct=Math.min(1,e.waterTimer/90);
      ctx.fillStyle='rgba(0,0,0,0.35)';
      ctx.fillRect(e.x, e.y-10, e.w, 6);
      ctx.fillStyle=pct<0.6?'#43e97b':'#e74c3c';
      ctx.fillRect(e.x, e.y-10, e.w*pct, 6);
    }
  }

  function drawPopups() {
    ctx.save();
    for(var i=popups.length-1;i>=0;i--){
      var p=popups[i];
      p.y-=1; p.life--;
      ctx.globalAlpha=Math.min(1,p.life/20);
      ctx.font='bold 18px Arial';
      ctx.fillStyle='#ffe66d';
      ctx.strokeStyle='#000'; ctx.lineWidth=3;
      ctx.strokeText(p.txt,p.x,p.y);
      ctx.fillText(p.txt,p.x,p.y);
      if(p.life<=0) popups.splice(i,1);
    }
    ctx.restore();
  }

  // ── Eagle update ─────────────────────────────────────────────────────────
  function updateEagle() {
    var e=eagle, spd=3.5, wx=getWindStrength();
    if(e.returning){
      e.vy=-4.5; e.vx*=0.88;
      e.x+=e.vx; e.y+=e.vy;
      if(e.y < WATER_Y-60){ e.returning=false; e.inWater=false; e.waterTimer=0; }
      e.x=Math.max(0,Math.min(W-e.w,e.x));
      if(e.invincible>0) e.invincible--;
      return;
    }
    e.vx=0; e.vy=0;
    if(keys['ArrowLeft']||keys['a']||keys['A'])  e.vx=-spd;
    if(keys['ArrowRight']||keys['d']||keys['D']) e.vx=spd;
    if(keys['ArrowUp']||keys['w']||keys['W'])    e.vy=-spd;
    if(keys['ArrowDown']||keys['s']||keys['S'])  e.vy=spd;
    if(!e.inWater) e.vx += wx*0.15*(level===3?1.6:1);
    e.x+=e.vx; e.y+=e.vy;
    e.x=Math.max(0,Math.min(W-e.w,e.x));
    e.y=Math.max(0,Math.min(H-e.h,e.y));
    if(e.y+e.h > WATER_Y){ e.inWater=true; }
    else { e.inWater=false; e.waterTimer=0; }
    if(e.inWater){
      e.waterTimer++;
      if(e.waterTimer>=90){
        e.returning=true; e.invincible=90;
        showMsg('🌊 返回水面！',70);
      }
    }
    if(e.invincible>0) e.invincible--;
  }

  // ── Collisions ───────────────────────────────────────────────────────────
  function checkCollisions() {
    var e=eagle;
    for(var i=fishArr.length-1;i>=0;i--){
      var f=fishArr[i];
      if(f.popped) continue;
      if(e.x<f.x+f.w && e.x+e.w>f.x && e.y<f.y+f.h && e.y+e.h>f.y){
        if(e.returning){
          // Push fish — send it flying upward
          f.popped=true; f.popVy=-5-Math.random()*3;
          continue;
        }
        if(e.invincible>0) continue;
        if(f.size==='shark'){
          lives--; updateHUD();
          e.invincible=130;
          showMsg('🦈 被鲨鱼咬了！-1条命',90);
          if(lives<=0){ gameOver(); return; }
        } else {
          score+=f.pts; updateHUD();
          var label=f.pts===1.5?'🐟大鱼':f.pts===1?'🐠中鱼':'🐡小鱼';
          addPopup('+'+f.pts, f.x+f.w/2-10, f.y-5);
          showMsg(label+' +'+f.pts+'分！',50);
          fishArr.splice(i,1); spawnFish();
          checkLevelUp();
        }
      }
    }
  }

  function checkLevelUp() {
    if(level<3 && score>=LEVEL_SCORES[level]){
      level++;
      showMsg('🎉 升到第'+level+'关！风浪变大！',130);
      resetLevel(); updateHUD();
    } else if(level===3 && score>=18){
      gameWin();
    }
  }

  // ── End screens ──────────────────────────────────────────────────────────
  function gameOver() {
    gameActive=false;
    setTimeout(function(){
      overlay.style.display='flex';
      overlay.innerHTML=
        '<h1 style="color:#ff6b6b">💀 游戏结束</h1>'+
        '<p style="color:#fff">最终得分：<b style="color:#ffe66d">'+score.toFixed(1)+'分</b><br>共到达第'+level+'关</p>'+
        '<button class="bigBtn" id="startBtn">再玩一次 🔄</button>';
      var sb=document.getElementById('startBtn');
      if(sb) sb.addEventListener('click',startGame);
    },600);
  }

  function gameWin() {
    gameActive=false;
    setTimeout(function(){
      overlay.style.display='flex';
      overlay.innerHTML=
        '<h1 style="color:#ffe66d">🏆 你赢了！</h1>'+
        '<p style="color:#fff">太厉害了！得了<b style="color:#ffe66d">'+score.toFixed(1)+'分</b>，<br>通关全部三关！🎉🦅🎉</p>'+
        '<button class="bigBtn" id="startBtn">再玩一次 🔄</button>';
      var sb=document.getElementById('startBtn');
      if(sb) sb.addEventListener('click',startGame);
    },600);
  }

  // ── Main loop ────────────────────────────────────────────────────────────
  function loop() {
    if(!gameActive) return;
    frameCount++;
    ctx.clearRect(0,0,W,H);

    drawSky();
    drawClouds();
    drawBirds();
    if(level>1) drawRain();   // rain from level 2+
    drawOcean();
    drawWaterSurface();
    drawFish();
    updateEagle();
    checkCollisions();
    drawEagle();
    drawPopups();

    if(msgTimer>0){ msgTimer--; if(msgTimer<=0) msgBox.style.display='none'; }

    requestAnimationFrame(loop);
  }

  // ── Input ────────────────────────────────────────────────────────────────
  document.addEventListener('keydown',function(e){
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup',function(e){ keys[e.key]=false; });

  // Touch
  var touch={active:false,sx:0,sy:0};
  canvas.addEventListener('touchstart',function(e){
    var t=e.touches[0]; touch.active=true; touch.sx=t.clientX; touch.sy=t.clientY;
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    if(!touch.active) return;
    var t=e.touches[0];
    var dx=t.clientX-touch.sx, dy=t.clientY-touch.sy;
    keys['ArrowLeft']=dx<-8; keys['ArrowRight']=dx>8;
    keys['ArrowUp']=dy<-8;   keys['ArrowDown']=dy>8;
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',function(){
    touch.active=false;
    keys['ArrowLeft']=keys['ArrowRight']=keys['ArrowUp']=keys['ArrowDown']=false;
  });

  // Start button
  var startBtn=document.getElementById('startBtn');
  if(startBtn) startBtn.addEventListener('click',startGame);

  // BUTTON CHECKLIST: #startBtn ✓
});
</script>
</body>
</html>
